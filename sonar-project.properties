sonar.projectKey=sitecampeonato
sonar.projectName=SiteCampeonato
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8
sonar.sources=app,components,lib,types
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts

sonar.exclusions=.next/**,node_modules/**,coverage/**,public/**,supabase/**,.tmp_ssh/**,next-env.d.ts,leagueofbronze.json
sonar.coverage.exclusions=tests/**,**/*.test.ts,eslint.config.mjs,next.config.ts,postcss.config.js,tailwind.config.ts,vitest.config.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
